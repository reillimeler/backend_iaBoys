<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Registro de Insumo</h2>
      <p>Ingrese los detalles del nuevo insumo</p>
    </div>

    <form (submit)="$event.preventDefault(); onRegister()" class="register-form">
      <div class="form-group">
        <label for="codigo_interno">Código Interno</label>
        <input 
          type="text" 
          id="codigo_interno" 
          [ngModel]="codigoInterno()" 
          (ngModelChange)="codigoInterno.set($event)" 
          name="codigo_interno" 
          placeholder="Ej: AG-15"
          required>
      </div>

      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input 
          type="text" 
          id="nombre" 
          [ngModel]="nombre()" 
          (ngModelChange)="nombre.set($event)" 
          name="nombre" 
          placeholder="Ej: Aguja #15"
          required>
      </div>

      <div class="form-group">
        <label for="stock_minimo">Stock Mínimo</label>
        <input 
          type="number" 
          id="stock_minimo" 
          [ngModel]="stockMinimo()" 
          (ngModelChange)="stockMinimo.set($event)" 
          name="stock_minimo" 
          placeholder="Ej: 50"
          min="0"
          required>
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      @if (successMessage()) {
        <p class="success-text">{{ successMessage() }}</p>
      }

      <button type="submit" class="btn-register">Registrar Insumo</button>
    </form>
  </div>
</div>
